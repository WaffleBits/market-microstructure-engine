name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Matching engine tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package
        run: pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Run benchmark smoke test
        run: python -m mm_engine.benchmark --orders 1000

