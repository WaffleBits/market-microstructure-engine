name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Matching engine tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package
        run: pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Run benchmark smoke test
        run: python -m mm_engine.benchmark --orders 1000

      - name: Configure native engine
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build native engine
        run: cmake --build build --config Release --parallel

      - name: Run native tests
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Verify Python and C++20 parity
        run: |
          for seed in 1 7 42 99; do
            python tools/compare_benchmarks.py \
              --native build/mm_engine_benchmark \
              --orders 5000 \
              --warmup 500 \
              --seed "$seed"
          done
